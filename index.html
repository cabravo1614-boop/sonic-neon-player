<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicNeon - Cyberpunk Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        body {
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor del Móvil */
        .phone-container {
            width: 360px;
            height: 740px;
            background: #050505;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .neon-glow {
            text-shadow: 0 0 10px #f0f;
        }

        .accent-pink { color: #ff00ff; }
        .bg-accent-pink { background-color: #ff00ff; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar invisible */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-active {
            color: #ff00ff;
            border-bottom: 2px solid #ff00ff;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.2);
        }

        .btn-recent {
            background: linear-gradient(90deg, #ff00ff, #aa00ff);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .nav-bar {
            background: rgba(5, 5, 5, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Header -->
        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-full border-2 border-pink-500 flex items-center justify-center">
                    <div class="w-2 h-2 bg-pink-500 rounded-full animate-pulse"></div>
                </div>
                <h1 class="text-xl font-bold tracking-tight">SonicNeon</h1>
            </div>
            <button class="w-10 h-10 glass-card rounded-xl flex items-center justify-center">
                <span class="material-symbols-rounded text-pink-500">settings</span>
            </button>
        </header>

        <!-- Search -->
        <div class="px-6 mb-6">
            <div class="search-bar w-full rounded-2xl p-4 flex items-center gap-3">
                <span class="material-symbols-rounded text-pink-500 opacity-70">search</span>
                <input type="text" placeholder="Buscar canciones, artistas..." class="bg-transparent border-none outline-none text-sm w-full text-zinc-400">
            </div>
        </div>

        <!-- Tabs -->
        <div class="px-6 flex gap-6 text-sm font-semibold text-zinc-500 mb-6 overflow-x-auto no-scrollbar">
            <span class="tab-active pb-1 whitespace-nowrap">Canciones</span>
            <span class="whitespace-nowrap">Playlist</span>
            <span class="whitespace-nowrap">Carpetas</span>
            <span class="whitespace-nowrap">Artistas</span>
        </div>

        <!-- Quick Filters -->
        <div class="px-6 flex gap-3 mb-6">
            <button class="btn-recent px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-2 uppercase tracking-widest">
                <span class="material-symbols-rounded text-sm">schedule</span> Recientes
            </button>
            <button class="bg-zinc-900 px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-2 uppercase tracking-widest text-zinc-400">
                <span class="material-symbols-rounded text-sm">trending_up</span> Más reproducidos
            </button>
        </div>

        <!-- Song List -->
        <main class="flex-1 overflow-y-auto px-6 space-y-4 no-scrollbar pb-24">
            <!-- Song 1 -->
            <div class="flex items-center gap-4 group">
                <img src="https://picsum.photos/seed/neon1/200" class="w-14 h-14 rounded-2xl object-cover shadow-lg group-active:scale-95 transition-transform" alt="Cover">
                <div class="flex-1">
                    <h3 class="font-bold text-sm">Neon Nights</h3>
                    <p class="text-xs text-zinc-500 italic">Synth Weaver</p>
                </div>
                <div class="flex items-center gap-3 text-zinc-600">
                    <span class="material-symbols-rounded text-lg">favorite</span>
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>

            <!-- Song 2 -->
            <div class="flex items-center gap-4 group">
                <img src="https://picsum.photos/seed/cyber2/200" class="w-14 h-14 rounded-2xl object-cover group-active:scale-95 transition-transform" alt="Cover">
                <div class="flex-1">
                    <h3 class="font-bold text-sm">Cyber Rush</h3>
                    <p class="text-xs text-zinc-500 italic">Glitch Master</p>
                </div>
                <div class="flex items-center gap-3 text-zinc-600">
                    <span class="material-symbols-rounded text-lg">favorite</span>
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>

            <!-- Song 3 -->
            <div class="flex items-center gap-4 group">
                <img src="https://picsum.photos/seed/pulse3/200" class="w-14 h-14 rounded-2xl object-cover group-active:scale-95 transition-transform" alt="Cover">
                <div class="flex-1">
                    <h3 class="font-bold text-sm">Digital Pulse</h3>
                    <p class="text-xs text-zinc-500 italic">Techno Core</p>
                </div>
                <div class="flex items-center gap-3 text-zinc-600">
                    <span class="material-symbols-rounded text-lg">favorite</span>
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>

            <!-- Song 4 -->
            <div class="flex items-center gap-4 group">
                <img src="https://picsum.photos/seed/void4/200" class="w-14 h-14 rounded-2xl object-cover group-active:scale-95 transition-transform" alt="Cover">
                <div class="flex-1">
                    <h3 class="font-bold text-sm">Neon Void</h3>
                    <p class="text-xs text-zinc-500 italic">Data Ghost</p>
                </div>
                <div class="flex items-center gap-3 text-zinc-600">
                    <span class="material-symbols-rounded text-lg">favorite</span>
                    <span class="material-symbols-rounded">chevron_right</span>
                </div>
            </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="nav-bar absolute bottom-0 w-full h-16 flex justify-around items-center px-6">
            <button class="text-zinc-500 hover:text-pink-500 transition-colors">
                <span class="material-symbols-rounded text-2xl">arrow_back_ios_new</span>
            </button>
            <button class="text-white hover:text-pink-500 transition-colors">
                <span class="material-symbols-rounded text-4xl">radio_button_checked</span>
            </button>
            <button class="text-zinc-500 hover:text-pink-500 transition-colors">
                <span class="material-symbols-rounded text-2xl">crop_square</span>
            </button>
        </nav>
    </div>

</body>
</html>
